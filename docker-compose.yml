services:
  caddy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    ports:
      - "8181:80"
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - frontend
      - api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - app-network
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      TZ: Australia/Melbourne
    volumes:
      - /volume1/docker/fitness-data:/data
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge