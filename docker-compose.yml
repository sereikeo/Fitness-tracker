services:
  caddy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    ports:
      - "8181:80"
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - frontend
      - api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - app-network
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      NOTION_API_KEY: ${NOTION_API_KEY}
      TZ: Australia/Melbourne
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge