name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Log in to ACR
      uses: azure/docker-login@v1
      with:
        login-server: your-acr-name.azurecr.io

    - name: Build and push frontend image
      run: |
        docker build -t your-acr-name.azurecr.io/frontend:latest ./frontend
        docker push your-acr-name.azurecr.io/frontend:latest

    - name: Build and push API image
      run: |
        docker build -t your-acr-name.azurecr.io/api:latest ./api
        docker push your-acr-name.azurecr.io/api:latest

    - name: Deploy to Azure Container Apps
      uses: azure/container-apps-deploy-action@v1
      with:
        container-app-name: ca-api
        image-to-upgrade: your-acr-name.azurecr.io/api:latest
        resource-group: rg-fitness-tracker
        environment-name: cae-fitness-tracker

    - name: Deploy to Azure Container Apps (Frontend)
      uses: azure/container-apps-deploy-action@v1
      with:
        container-app-name: ca-frontend
        image-to-upgrade: your-acr-name.azurecr.io/frontend:latest
        resource-group: rg-fitness-tracker
        environment-name: cae-fitness-tracker

    - name: Deploy to Azure Container Apps (Caddy)
      uses: azure/container-apps-deploy-action@v1
      with:
        container-app-name: ca-caddy
        image-to-upgrade: caddy:latest
        resource-group: rg-fitness-tracker
        environment-name: cae-fitness-tracker
