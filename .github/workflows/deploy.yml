name: Deploy Fitness Tracker

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: [self-hosted, linux, synology]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check .env exists
        run: |
          if [ ! -f /tmp/github-runner/Fitness-tracker/.env ]; then
            echo "ERROR: .env missing at /tmp/github-runner/Fitness-tracker/.env (NAS path: /volume1/docker/github-runner/Fitness-tracker/.env)"
            exit 1
          fi

      - name: Copy .env into workspace
        run: cp /tmp/github-runner/Fitness-tracker/.env $GITHUB_WORKSPACE/.env

      - name: Ensure SQLite data directory exists
        run: mkdir -p /volume1/docker/fitness-data
        
      - name: Build images
        run: sudo docker-compose build

      - name: Deploy containers
        run: sudo docker-compose up -d