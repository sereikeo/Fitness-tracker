name: Deploy Fitness Tracker

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: '${{ secrets.ACR_LOGIN_SERVER }}'
          username: '${{ secrets.AZURE_CREDENTIALS.username }}'
          password: '${{ secrets.AZURE_CREDENTIALS.password }}'

      - name: Build and push frontend image
        uses: docker/build-push-action@v3
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: '${{ secrets.ACR_LOGIN_SERVER }}/fitness-tracker-frontend:latest'

      - name: Build and push API image
        uses: docker/build-push-action@v3
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: '${{ secrets.ACR_LOGIN_SERVER }}/fitness-tracker-api:latest'

      - name: Deploy to Azure Container Apps
        uses: azure/cli@v1
        with:
          azcliversion: 2.37.0
          inlineScript: |
            az login --service-principal -u ${{ secrets.AZURE_CREDENTIALS.username }} -p ${{ secrets.AZURE_CREDENTIALS.password }} --tenant ${{ secrets.TENANT_ID }}
            az deployment group create \
              --resource-group <your-resource-group-name> \
              --template-file ./infra/main.bicep \
              --parameters location=<your-location>
